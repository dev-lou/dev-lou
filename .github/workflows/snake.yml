name: Generate Snake Animation

on:
  schedule:
    - cron: "0 0 * * *"   # runs daily at midnight UTC
  workflow_dispatch:       # allows manual trigger from GitHub UI
  push:
    branches:
      - main

jobs:
  generate:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Generate snake animation (dark)
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            assets/github-snake.svg
            assets/github-snake-dark.svg?palette=github-dark&color_snake=#73daca&color_dots=#1a1b2e,#3d59a1,#70a5fd,#bb9af7,#ff9e64

      - name: Commit and push output
        uses: EndBug/add-and-commit@v9
        with:
          add: "assets/github-snake.svg assets/github-snake-dark.svg"
          message: "chore: update snake animation [skip ci]"
          default_author: github_actions
