<svg xmlns="http://www.w3.org/2000/svg" width="400" height="180" viewBox="0 0 400 180" fill="none">
  <defs>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff9e64" stop-opacity="0.8" />
      <stop offset="100%" stop-color="#e0af68" stop-opacity="0.2" />
    </linearGradient>
    <style>
      .bg { fill: #0d1117; stroke: url(#accent); stroke-width: 2; transition: all 0.3s ease; }
      .bg:hover { fill: #1a1b2e; }
      .title { fill: #a9b1d6; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; font-size: 18px; font-weight: 700; }
      .subtitle { fill: #ff9e64; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; font-size: 13px; font-weight: 600; font-style: italic; }
      .desc { fill: #7a88cf; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; font-size: 12px; font-weight: 400; line-height: 1.5; }
      .badge-bg { fill: #1a1b2e; stroke-width: 1; rx: 4; }
      .badge-text { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; font-size: 11px; font-weight: 600; fill: #a9b1d6; }
      @keyframes float { 0%,100% { transform:translateY(0) } 50% { transform:translateY(-2px) } }
      .ico { animation: float 3s ease-in-out infinite; }
    </style>
  </defs>

  <rect class="bg" width="396" height="176" x="2" y="2" rx="12" />

  <!-- Icon -->
  <g class="ico" transform="translate(20, 18)" stroke="#ff9e64" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <circle cx="9" cy="21" r="1" />
    <circle cx="20" cy="21" r="1" />
    <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6" />
  </g>

  <!-- Text Content -->
  <text x="54" y="35" class="title">Cict-Store</text>
  <text x="20" y="60" class="subtitle">Department E-Commerce Platform</text>
  
  <text x="20" y="85" class="desc">Full-stack e-commerce system with product catalogs,</text>
  <text x="20" y="105" class="desc">order queues, automated PDF invoicing, and auth.</text>

  <!-- Badges -->
  <g transform="translate(20, 135)">
    <!-- Laravel -->
    <rect class="badge-bg" width="55" height="22" stroke="#FF2D20" />
    <text x="8" y="15" class="badge-text">Laravel</text>

    <!-- Blade -->
    <g transform="translate(63, 0)">
      <rect class="badge-bg" width="45" height="22" stroke="#FF2D20" />
      <text x="8" y="15" class="badge-text">Blade</text>
    </g>

    <!-- MySQL -->
    <g transform="translate(116, 0)">
      <rect class="badge-bg" width="50" height="22" stroke="#4479A1" />
      <text x="8" y="15" class="badge-text">MySQL</text>
    </g>

    <!-- Tailwind -->
    <g transform="translate(174, 0)">
      <rect class="badge-bg" width="60" height="22" stroke="#06B6D4" />
      <text x="8" y="15" class="badge-text">Tailwind</text>
    </g>
  </g>
</svg>
