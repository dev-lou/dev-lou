<svg xmlns="http://www.w3.org/2000/svg" width="380" height="200" viewBox="0 0 380 200" fill="none">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="card-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1f2335" />
      <stop offset="100%" stop-color="#16161e" />
    </linearGradient>

    <!-- Language Gradients -->
    <linearGradient id="php-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#7aa2f7" />
      <stop offset="100%" stop-color="#89ddff" />
    </linearGradient>
    <linearGradient id="js-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#e0af68" />
      <stop offset="100%" stop-color="#ff9e64" />
    </linearGradient>
    <linearGradient id="py-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#3cc5e3" />
      <stop offset="100%" stop-color="#7bc5e3" />
    </linearGradient>
    <linearGradient id="ts-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#61afef" />
      <stop offset="100%" stop-color="#2ac3de" />
    </linearGradient>
    <linearGradient id="dart-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#73daca" />
      <stop offset="100%" stop-color="#b9f27c" />
    </linearGradient>

    <!-- Glow Filter -->
    <filter id="glow-filter" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>

    <style>
      @keyframes expand-bar {
        from { width: 0; }
      }
      @keyframes pulse-glow {
        0% { opacity: 0.6; }
        50% { opacity: 0.9; }
        100% { opacity: 0.6; }
      }
      .bar {
        animation: expand-bar 1.5s cubic-bezier(0.1, 0.8, 0.2, 1) forwards;
      }
      .glow {
        animation: pulse-glow 2s infinite ease-in-out;
      }
    </style>
  </defs>

  <!-- Card Background -->
  <rect width="380" height="200" rx="8" fill="url(#card-bg)" stroke="#30363d" stroke-width="1" />

  <!-- Title -->
  <text x="20" y="30" fill="#70a5fd" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="14" font-weight="700" letter-spacing="1">
    MOST USED LANGUAGES
  </text>
  <line x1="20" y1="40" x2="360" y2="40" stroke="#30363d" stroke-width="1" />

  <!-- PHP (35%) -->
  <text x="20" y="62" fill="#a9b1d6" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="11" font-weight="600">PHP</text>
  <text x="335" y="62" fill="#565f89" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="11" font-weight="600">35%</text>
  <rect x="20" y="68" width="340" height="8" rx="4" fill="#161b22" />
  <rect class="bar" x="20" y="68" width="119" height="8" rx="4" fill="url(#php-grad)" filter="url(#glow-filter)" />

  <!-- JavaScript (30%) -->
  <text x="20" y="94" fill="#a9b1d6" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="11" font-weight="600">JavaScript</text>
  <text x="335" y="94" fill="#565f89" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="11" font-weight="600">30%</text>
  <rect x="20" y="100" width="340" height="8" rx="4" fill="#161b22" />
  <rect class="bar" x="20" y="100" width="102" height="8" rx="4" fill="url(#js-grad)" filter="url(#glow-filter)" />

  <!-- Python (15%) -->
  <text x="20" y="126" fill="#a9b1d6" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="11" font-weight="600">Python</text>
  <text x="335" y="126" fill="#565f89" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="11" font-weight="600">15%</text>
  <rect x="20" y="132" width="340" height="8" rx="4" fill="#161b22" />
  <rect class="bar" x="20" y="132" width="51" height="8" rx="4" fill="url(#py-grad)" filter="url(#glow-filter)" />

  <!-- TypeScript & Dart combined in last row (10% each) -->
  <!-- TypeScript (10%) -->
  <g transform="translate(0, 0)">
    <text x="20" y="158" fill="#a9b1d6" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="11" font-weight="600">TypeScript</text>
    <text x="145" y="158" fill="#565f89" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="11" font-weight="600">10%</text>
    <rect x="20" y="164" width="140" height="8" rx="4" fill="#161b22" />
    <rect class="bar" x="20" y="164" width="34" height="8" rx="4" fill="url(#ts-grad)" filter="url(#glow-filter)" />
  </g>

  <!-- Dart (10%) -->
  <g transform="translate(180, 0)">
    <text x="20" y="158" fill="#a9b1d6" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="11" font-weight="600">Dart / Svelte</text>
    <text x="145" y="158" fill="#565f89" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="11" font-weight="600">10%</text>
    <rect x="20" y="164" width="140" height="8" rx="4" fill="#161b22" />
    <rect class="bar" x="20" y="164" width="34" height="8" rx="4" fill="url(#dart-grad)" filter="url(#glow-filter)" />
  </g>
</svg>
