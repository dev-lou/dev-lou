<svg xmlns="http://www.w3.org/2000/svg" width="800" height="40" viewBox="0 0 800 40" fill="none">
  <defs>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#bb9af7" />
      <stop offset="100%" stop-color="#ff79c6" />
    </linearGradient>
    <filter id="g" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="2" result="b" />
      <feComposite in="SourceGraphic" in2="b" operator="over" />
    </filter>
    <style>
      @keyframes glow { 0%,100% { opacity:.7 } 50% { opacity:1 } }
      @keyframes float { 0%,100% { transform:translateY(0) } 50% { transform:translateY(-2px) } }
      .ico { animation: float 3s ease-in-out infinite; }
      .line { animation: glow 2.5s ease-in-out infinite; }
    </style>
  </defs>
  <g transform="translate(12,8)">
    <g class="ico" stroke="url(#accent)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none">
      <polygon points="12 2 22 8.5 22 21.5 12 28 2 21.5 2 8.5" stroke-dasharray="0" />
      <line x1="12" y1="28" x2="12" y2="14" />
      <polyline points="22 8.5 12 14 2 8.5" />
    </g>
  </g>
  <text x="46" y="25" fill="#24292f" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif" font-size="15" font-weight="700" letter-spacing="1.5">FEATURED PROJECTS</text>
  <line class="line" x1="240" y1="20" x2="790" y2="20" stroke="url(#accent)" stroke-width="2" stroke-opacity="0.8" />
  <circle class="line" cx="240" cy="20" r="3" fill="#bb9af7" filter="url(#g)" />
</svg>
