<svg xmlns="http://www.w3.org/2000/svg" width="800" height="40" viewBox="0 0 800 40" fill="none">
  <defs>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#70a5fd" />
      <stop offset="100%" stop-color="#2ac3de" />
    </linearGradient>
    <filter id="g" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="2" result="b" />
      <feComposite in="SourceGraphic" in2="b" operator="over" />
    </filter>
    <style>
      @keyframes glow { 0%,100% { opacity:.7 } 50% { opacity:1 } }
      @keyframes float { 0%,100% { transform:translateY(0) } 50% { transform:translateY(-2px) } }
      .ico { animation: float 3s ease-in-out infinite; }
      .line { animation: glow 2.5s ease-in-out infinite; }
    </style>
  </defs>
  <g transform="translate(12,8)">
    <g class="ico" stroke="url(#accent)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none">
      <polyline points="16 18 22 12 16 6" />
      <polyline points="8 6 2 12 8 18" />
      <line x1="12" y1="2" x2="12" y2="22" stroke-dasharray="2 3" />
    </g>
  </g>
  <text x="46" y="25" fill="#24292f" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif" font-size="15" font-weight="700" letter-spacing="1.5">TECH STACK</text>
  <line class="line" x1="165" y1="20" x2="790" y2="20" stroke="url(#accent)" stroke-width="2" stroke-opacity="0.8" />
  <circle class="line" cx="165" cy="20" r="3" fill="#70a5fd" filter="url(#g)" />
</svg>
