<svg xmlns="http://www.w3.org/2000/svg" width="800" height="200" viewBox="0 0 800 200">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d1117" />
      <stop offset="100%" stop-color="#161b22" />
    </linearGradient>

    <!-- Wave Gradients -->
    <linearGradient id="wave1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#bb9af7" />
      <stop offset="100%" stop-color="#0088FF" />
    </linearGradient>
    <linearGradient id="wave2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#73daca" />
      <stop offset="100%" stop-color="#FFD700" />
    </linearGradient>
    
    <clipPath id="clip">
      <rect width="800" height="200" rx="12" />
    </clipPath>
  </defs>

  <g clip-path="url(#clip)">
    <!-- Dark Background -->
    <rect width="800" height="200" fill="url(#bg)" />

    <!-- Animated Waves -->
    <!-- Wave 1 (Back) -->
    <path fill="url(#wave1)" opacity="0.3">
      <animate attributeName="d" 
        values="M0,150 C200,100 400,200 800,150 L800,200 L0,200 Z;
                M0,150 C300,200 500,100 800,150 L800,200 L0,200 Z;
                M0,150 C200,100 400,200 800,150 L800,200 L0,200 Z" 
        dur="6s" repeatCount="indefinite" />
    </path>

    <!-- Wave 2 (Middle) -->
    <path fill="url(#wave2)" opacity="0.4">
      <animate attributeName="d" 
        values="M0,170 C250,220 550,120 800,170 L800,200 L0,200 Z;
                M0,170 C250,120 550,220 800,170 L800,200 L0,200 Z;
                M0,170 C250,220 550,120 800,170 L800,200 L0,200 Z" 
        dur="8s" repeatCount="indefinite" />
    </path>

    <!-- Wave 3 (Front) -->
    <path fill="url(#wave1)" opacity="0.6">
      <animate attributeName="d" 
        values="M0,180 C150,150 450,210 800,180 L800,200 L0,200 Z;
                M0,180 C350,210 650,150 800,180 L800,200 L0,200 Z;
                M0,180 C150,150 450,210 800,180 L800,200 L0,200 Z" 
        dur="5s" repeatCount="indefinite" />
    </path>

    <!-- Border -->
    <rect width="798" height="198" x="1" y="1" fill="none" stroke="#3b4261" stroke-width="2" rx="12" />

    <!-- Quote Text -->
    <g font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-weight="700" font-style="italic" text-anchor="middle">
      
      <!-- Main Text -->
      <text x="400" y="80" fill="#ffffff" font-size="24">
        "Coding is no longer about syntax;"
      </text>
      <text x="400" y="120" fill="#a9b1d6" font-size="22">
        it's about context, architecture, and orchestrating AI.
      </text>
    </g>
  </g>
</svg>
