<svg xmlns="http://www.w3.org/2000/svg" width="800" height="60" viewBox="0 0 800 60" fill="none">
  <defs>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <style>
      .bg { fill: #ffffff; stroke: #e8ecf0; stroke-width: 1; transition: all 0.3s ease; }
      .bg:hover { fill: #e8ecf0; stroke: #70a5fd; cursor: pointer; }
      .title { fill: #70a5fd; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; font-size: 15px; font-weight: 700; }
      .stack { fill: #24292f; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; font-size: 13px; font-weight: 500; }
      .desc { fill: #656d76; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; font-size: 13px; font-weight: 400; }
      .line { stroke: #2ac3de; stroke-width: 2; opacity: 0.8; filter: url(#glow); }
    </style>
  </defs>

  <rect class="bg" width="798" height="58" x="1" y="1" rx="6" />
  
  <text x="20" y="35" class="title">Church-QR</text>
  <text x="160" y="35" class="stack">JavaScript · Web Cryptography</text>
  <text x="450" y="35" class="desc">Safe community registration database</text>
  
  <line class="line" x1="140" y1="15" x2="140" y2="45" />
  <line class="line" x1="430" y1="15" x2="430" y2="45" />
</svg>