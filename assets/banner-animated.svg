<svg xmlns="http://www.w3.org/2000/svg" width="800" height="280" viewBox="0 0 800 280">
  <defs>
    <!-- Deep space background -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#050810" />
      <stop offset="50%" stop-color="#0a0e1a" />
      <stop offset="100%" stop-color="#06080f" />
    </linearGradient>

    <!-- Neon cyan glow for dev- -->
    <linearGradient id="glowCyan" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00d4ff" />
      <stop offset="100%" stop-color="#00a8cc" />
    </linearGradient>

    <!-- Neon purple glow for lou -->
    <linearGradient id="glowPurple" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#bf91f3" />
      <stop offset="100%" stop-color="#ff79c6" />
    </linearGradient>

    <!-- Top wave gradient -->
    <linearGradient id="wave1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00d4ff" stop-opacity="0.6" />
      <stop offset="50%" stop-color="#bf91f3" stop-opacity="0.4" />
      <stop offset="100%" stop-color="#ff79c6" stop-opacity="0.6" />
    </linearGradient>

    <!-- Glow filter for text -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="4" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <!-- Strong glow filter -->
    <filter id="strongGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="8" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <clipPath id="cardClip">
      <rect width="800" height="280" rx="0" />
    </clipPath>
  </defs>

  <g clip-path="url(#cardClip)">
    <!-- Background -->
    <rect width="800" height="280" fill="url(#bg)" />

    <!-- Subtle grid lines -->
    <g stroke="#0d1f3c" stroke-width="1" opacity="0.5">
      <line x1="0" y1="40" x2="800" y2="40" />
      <line x1="0" y1="80" x2="800" y2="80" />
      <line x1="0" y1="120" x2="800" y2="120" />
      <line x1="0" y1="160" x2="800" y2="160" />
      <line x1="0" y1="200" x2="800" y2="200" />
      <line x1="0" y1="240" x2="800" y2="240" />
      <line x1="100" y1="0" x2="100" y2="280" />
      <line x1="200" y1="0" x2="200" y2="280" />
      <line x1="300" y1="0" x2="300" y2="280" />
      <line x1="400" y1="0" x2="400" y2="280" />
      <line x1="500" y1="0" x2="500" y2="280" />
      <line x1="600" y1="0" x2="600" y2="280" />
      <line x1="700" y1="0" x2="700" y2="280" />
    </g>

    <!-- Animated scan line -->
    <rect x="0" y="0" width="800" height="2" fill="#00d4ff" opacity="0.3">
      <animate attributeName="y" values="0;280;0" dur="4s" repeatCount="indefinite" />
      <animate attributeName="opacity" values="0;0.4;0" dur="4s" repeatCount="indefinite" />
    </rect>

    <!-- Top wave accent -->
    <path fill="url(#wave1)" opacity="0.25">
      <animate attributeName="d"
        values="M0,15 C200,5 400,30 800,12 L800,0 L0,0 Z;
                M0,15 C300,28 600,5 800,18 L800,0 L0,0 Z;
                M0,15 C200,5 400,30 800,12 L800,0 L0,0 Z"
        dur="6s" repeatCount="indefinite" />
    </path>
    <!-- Bottom wave accent -->
    <path fill="url(#wave1)" opacity="0.25">
      <animate attributeName="d"
        values="M0,262 C200,275 500,255 800,268 L800,280 L0,280 Z;
                M0,262 C300,252 600,275 800,262 L800,280 L0,280 Z;
                M0,262 C200,275 500,255 800,268 L800,280 L0,280 Z"
        dur="7s" repeatCount="indefinite" />
    </path>

    <!-- Floating particles -->
    <circle cx="50" cy="80" r="2" fill="#00d4ff" opacity="0">
      <animate attributeName="cy" values="280;-20" dur="8s" repeatCount="indefinite" begin="0s" />
      <animate attributeName="opacity" values="0;0.8;0" dur="8s" repeatCount="indefinite" begin="0s" />
    </circle>
    <circle cx="150" cy="280" r="1.5" fill="#bf91f3" opacity="0">
      <animate attributeName="cy" values="280;-20" dur="6s" repeatCount="indefinite" begin="1s" />
      <animate attributeName="opacity" values="0;0.7;0" dur="6s" repeatCount="indefinite" begin="1s" />
    </circle>
    <circle cx="280" cy="280" r="2" fill="#ff79c6" opacity="0">
      <animate attributeName="cy" values="280;-20" dur="9s" repeatCount="indefinite" begin="2s" />
      <animate attributeName="opacity" values="0;0.6;0" dur="9s" repeatCount="indefinite" begin="2s" />
    </circle>
    <circle cx="400" cy="280" r="1.5" fill="#00d4ff" opacity="0">
      <animate attributeName="cy" values="280;-20" dur="7s" repeatCount="indefinite" begin="0.5s" />
      <animate attributeName="opacity" values="0;0.9;0" dur="7s" repeatCount="indefinite" begin="0.5s" />
    </circle>
    <circle cx="560" cy="280" r="2" fill="#bf91f3" opacity="0">
      <animate attributeName="cy" values="280;-20" dur="10s" repeatCount="indefinite" begin="3s" />
      <animate attributeName="opacity" values="0;0.7;0" dur="10s" repeatCount="indefinite" begin="3s" />
    </circle>
    <circle cx="680" cy="280" r="1.5" fill="#ff79c6" opacity="0">
      <animate attributeName="cy" values="280;-20" dur="5s" repeatCount="indefinite" begin="1.5s" />
      <animate attributeName="opacity" values="0;0.8;0" dur="5s" repeatCount="indefinite" begin="1.5s" />
    </circle>
    <circle cx="750" cy="280" r="2" fill="#00d4ff" opacity="0">
      <animate attributeName="cy" values="280;-20" dur="8.5s" repeatCount="indefinite" begin="4s" />
      <animate attributeName="opacity" values="0;0.6;0" dur="8.5s" repeatCount="indefinite" begin="4s" />
    </circle>

    <!-- Corner accents top-left -->
    <path d="M0,0 L40,0" stroke="#00d4ff" stroke-width="2" fill="none" />
    <path d="M0,0 L0,40" stroke="#00d4ff" stroke-width="2" fill="none" />
    <!-- Corner accents top-right -->
    <path d="M760,0 L800,0" stroke="#bf91f3" stroke-width="2" fill="none" />
    <path d="M800,0 L800,40" stroke="#bf91f3" stroke-width="2" fill="none" />
    <!-- Corner accents bottom-left -->
    <path d="M0,240 L0,280" stroke="#00d4ff" stroke-width="2" fill="none" />
    <path d="M0,280 L40,280" stroke="#00d4ff" stroke-width="2" fill="none" />
    <!-- Corner accents bottom-right -->
    <path d="M800,240 L800,280" stroke="#bf91f3" stroke-width="2" fill="none" />
    <path d="M760,280 L800,280" stroke="#bf91f3" stroke-width="2" fill="none" />

    <!-- MAIN TITLE: dev-lou -->
    <!-- Glow layer (blur) -->
    <text x="400" y="148" text-anchor="middle"
      font-family="'Courier New', Courier, monospace"
      font-size="88" font-weight="900" letter-spacing="-2"
      fill="#00d4ff" filter="url(#strongGlow)" opacity="0.5">dev-lou</text>

    <!-- Actual text: "dev-" in cyan, "lou" in purple -->
    <text x="400" y="148" text-anchor="middle"
      font-family="'Courier New', Courier, monospace"
      font-size="88" font-weight="900" letter-spacing="-2">
      <tspan fill="url(#glowCyan)">dev-</tspan><tspan fill="url(#glowPurple)">lou</tspan>
    </text>

    <!-- Blinking cursor after text -->
    <rect x="582" y="76" width="6" height="72" fill="#00d4ff" rx="2">
      <animate attributeName="opacity" values="1;0;1" dur="1s" repeatCount="indefinite" />
    </rect>

    <!-- Subtitle -->
    <text x="400" y="180" text-anchor="middle"
      font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif"
      font-size="15" font-weight="600" letter-spacing="6" fill="#a9b1d6">
      FULL STACK ARCHITECT &amp; AI-NATIVE DEVELOPER
    </text>

    <!-- Status line -->
    <g transform="translate(400, 220)" text-anchor="middle">
      <!-- Animated green dot -->
      <circle cx="-148" cy="-4" r="5" fill="#00FF00">
        <animate attributeName="opacity" values="1;0.2;1" dur="2s" repeatCount="indefinite" />
        <animate attributeName="r" values="4;6;4" dur="2s" repeatCount="indefinite" />
      </circle>
      <text x="-135" y="0"
        font-family="'Courier New', Courier, monospace"
        font-size="12" fill="#00FF00" text-anchor="start" letter-spacing="2">ONLINE</text>

      <!-- Separator -->
      <text x="-50" y="0" fill="#3b4261" font-size="12">|</text>

      <!-- Status text -->
      <text x="0" y="0"
        font-family="'Courier New', Courier, monospace"
        font-size="12" fill="#565f89" letter-spacing="2">PHP • JS • PYTHON • TYPESCRIPT</text>
    </g>

    <!-- Bottom handle/tag -->
    <text x="400" y="255" text-anchor="middle"
      font-family="'Courier New', Courier, monospace"
      font-size="11" fill="#3b4261" letter-spacing="3">github.com/dev-lou</text>
  </g>
</svg>
