<svg xmlns="http://www.w3.org/2000/svg" width="800" height="64" viewBox="0 0 800 64" fill="none">
  <defs>
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1f2335" />
      <stop offset="100%" stop-color="#16161e" />
    </linearGradient>
    <linearGradient id="ai-accent" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#bb9af7" />
      <stop offset="100%" stop-color="#ff007f" />
    </linearGradient>
    
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>

    <style>
      @keyframes pulse-accent {
        0% { opacity: 0.8; }
        50% { opacity: 1; filter: drop-shadow(0 0 2px #bb9af7); }
        100% { opacity: 0.8; }
      }
      @keyframes pulse-pill {
        0% { stroke-opacity: 0.4; fill-opacity: 0.1; }
        50% { stroke-opacity: 0.9; fill-opacity: 0.2; }
        100% { stroke-opacity: 0.4; fill-opacity: 0.1; }
      }
      @keyframes slide-chevron {
        0% { transform: translateX(0); }
        50% { transform: translateX(4px); }
        100% { transform: translateX(0); }
      }
      @keyframes float-icon {
        0% { transform: translateY(0px); }
        50% { transform: translateY(-1.5px); }
        100% { transform: translateY(0px); }
      }
      .accent-bar {
        animation: pulse-accent 2s infinite ease-in-out;
      }
      .pill-border {
        animation: pulse-pill 2.5s infinite ease-in-out;
      }
      .chevron {
        animation: slide-chevron 1.5s infinite ease-in-out;
      }
      .animated-icon {
        animation: float-icon 3s infinite ease-in-out;
        transform-origin: center;
      }
    </style>
  </defs>

  <!-- Outer Container -->
  <rect width="800" height="64" rx="8" fill="url(#bg-grad)" stroke="#30363d" stroke-width="1" />
  
  <!-- Left Side Accent Indicator Bar -->
  <rect class="accent-bar" width="4" height="64" rx="2" fill="url(#ai-accent)" />

  <!-- Section Icon (Processor/AI/Chip Icon) -->
  <g class="animated-icon" transform="translate(20, 20)" stroke="url(#ai-accent)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <rect x="4" y="4" width="16" height="16" rx="2" />
    <line x1="9" y1="1" x2="9" y2="4" />
    <line x1="15" y1="1" x2="15" y2="4" />
    <line x1="9" y1="20" x2="9" y2="23" />
    <line x1="15" y1="20" x2="15" y2="23" />
    <line x1="20" y1="9" x2="23" y2="9" />
    <line x1="20" y1="15" x2="23" y2="15" />
    <line x1="1" y1="9" x2="4" y2="9" />
    <line x1="1" y1="15" x2="4" y2="15" />
  </g>

  <!-- Section Title (Line 1) -->
  <text x="64" y="27" fill="#a9b1d6" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="13" font-weight="700" letter-spacing="1">
    AI-NATIVE DEVELOPMENT WORKFLOW
  </text>

  <!-- Subtitle (Line 2 - No Overlapping!) -->
  <text x="64" y="45" fill="#565f89" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="10.5" font-weight="500" letter-spacing="0.5">
    Agentic Pair Programming  •  Context Engineering  •  skills/rules context structures
  </text>

  <!-- Interactive Call-To-Action (Right Side) -->
  <g transform="translate(650, 19)">
    <!-- Pill Badge -->
    <rect class="pill-border" width="130" height="26" rx="13" fill="#1e2233" stroke="#bb9af7" stroke-width="1" filter="url(#glow)" />
    <!-- Expand Text -->
    <text x="16" y="17" fill="#bb9af7" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="9.5" font-weight="700" letter-spacing="1">
      CLICK TO EXPAND
    </text>
    <!-- Chevron -->
    <path class="chevron" d="M110 9l4 4-4 4" stroke="#bb9af7" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none" />
  </g>
</svg>
