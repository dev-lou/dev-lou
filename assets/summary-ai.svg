<svg xmlns="http://www.w3.org/2000/svg" width="800" height="56" viewBox="0 0 800 56" fill="none">
  <!-- Card Background with Gradient -->
  <defs>
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1f2335" />
      <stop offset="100%" stop-color="#16161e" />
    </linearGradient>
    <linearGradient id="ai-accent" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#bb9af7" />
      <stop offset="100%" stop-color="#ff007f" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Outer Rounded Container -->
  <rect width="800" height="56" rx="8" fill="url(#bg-grad)" stroke="#30363d" stroke-width="1" />
  
  <!-- Left Side Accent Indicator Bar -->
  <rect width="4" height="56" rx="2" fill="url(#ai-accent)" />

  <!-- Section Icon (Processor/AI/Chip Icon) -->
  <g transform="translate(20, 16)" stroke="url(#ai-accent)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <rect x="4" y="4" width="16" height="16" rx="2" />
    <line x1="9" y1="1" x2="9" y2="4" />
    <line x1="15" y1="1" x2="15" y2="4" />
    <line x1="9" y1="20" x2="9" y2="23" />
    <line x1="15" y1="20" x2="15" y2="23" />
    <line x1="20" y1="9" x2="23" y2="9" />
    <line x1="20" y1="15" x2="23" y2="15" />
    <line x1="1" y1="9" x2="4" y2="9" />
    <line x1="1" y1="15" x2="4" y2="15" />
  </g>

  <!-- Section Title -->
  <text x="60" y="34" fill="#a9b1d6" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif" font-size="14" font-weight="700" letter-spacing="1">
    AI-NATIVE DEVELOPMENT WORKFLOW
  </text>

  <!-- Subtitle -->
  <text x="325" y="33" fill="#565f89" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif" font-size="11" font-weight="500" letter-spacing="0.5">
    •  Agentic Co-Pilots &amp; Custom Context Rules
  </text>

  <!-- Interactive Call-To-Action (Right Side) -->
  <g transform="translate(660, 15)">
    <!-- Pill Badge -->
    <rect width="120" height="26" rx="13" fill="#1e2233" stroke="#bb9af7" stroke-width="1" stroke-opacity="0.6" filter="url(#glow)" />
    <!-- Expand Text -->
    <text x="18" y="17" fill="#bb9af7" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif" font-size="10" font-weight="700" letter-spacing="1">
      CLICK TO EXPAND
    </text>
    <!-- Chevron -->
    <path d="M102 11l4 4-4 4" stroke="#bb9af7" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
  </g>
</svg>
