<svg xmlns="http://www.w3.org/2000/svg" width="800" height="60" viewBox="0 0 800 60" fill="none">
  <defs>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#70a5fd" />
      <stop offset="100%" stop-color="#2ac3de" />
    </linearGradient>
    <style>
      @keyframes float { 0%,100% { transform:translateY(0) } 50% { transform:translateY(-3px) } }
      .ico { animation: float 3s ease-in-out infinite; }
      rect:hover { fill: #1a1b2e; cursor: pointer; }
    </style>
  </defs>
  <rect width="800" height="60" rx="8" fill="#0d1117" stroke="url(#accent)" stroke-width="2" />
  <g transform="translate(25, 18)">
    <g class="ico" stroke="url(#accent)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none">
      <polyline points="16 18 22 12 16 6" />
      <polyline points="8 6 2 12 8 18" />
    </g>
  </g>
  <text x="70" y="36" fill="#a9b1d6" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif" font-size="15" font-weight="700">SECONDARY &amp; ARCHIVED PROJECTS</text>
  <text x="780" y="36" text-anchor="end" fill="#70a5fd" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif" font-size="14" font-weight="700">CLICK TO EXPAND ▼</text>
</svg>
