<svg xmlns="http://www.w3.org/2000/svg" width="800" height="40" viewBox="0 0 800 40" fill="none">
  <defs>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#e0af68" />
      <stop offset="100%" stop-color="#ff9e64" />
    </linearGradient>
    <filter id="g" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="2" result="b" />
      <feComposite in="SourceGraphic" in2="b" operator="over" />
    </filter>
    <style>
      @keyframes glow { 0%,100% { opacity:.7 } 50% { opacity:1 } }
      @keyframes float { 0%,100% { transform:translateY(0) } 50% { transform:translateY(-2px) } }
      .ico { animation: float 3s ease-in-out infinite; }
      .line { animation: glow 2.5s ease-in-out infinite; }
    </style>
  </defs>
  <g transform="translate(12,6)">
    <g class="ico" stroke="url(#accent)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none">
      <path d="M6 9H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v2a2 2 0 0 1-2 2h-2" />
      <path d="M6 9l4 12h4l4-12" />
      <circle cx="12" cy="25" r="2" />
    </g>
  </g>
  <text x="46" y="25" fill="#a9b1d6" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif" font-size="15" font-weight="700" letter-spacing="1.5">ACHIEVEMENTS</text>
  <line class="line" x1="200" y1="20" x2="790" y2="20" stroke="url(#accent)" stroke-width="2" stroke-opacity="0.8" />
  <circle class="line" cx="200" cy="20" r="3" fill="#e0af68" filter="url(#g)" />
</svg>
