<svg xmlns="http://www.w3.org/2000/svg" width="140" height="40" viewBox="0 0 140 40" fill="none">
  <defs>
    <style>
      .bg { fill: #0d1117; stroke: #EA4335; stroke-width: 1.5; transition: all 0.3s ease; }
      .bg:hover { fill: #1a1b2e; stroke-width: 2.5; filter: drop-shadow(0 0 6px #EA433580); cursor: pointer; }
      .text { fill: #a9b1d6; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; font-size: 14px; font-weight: 700; letter-spacing: 1px; }
      @keyframes pulse { 0% { filter: drop-shadow(0 0 2px #EA433540); } 50% { filter: drop-shadow(0 0 6px #EA433580); } 100% { filter: drop-shadow(0 0 2px #EA433540); } }
      .glow-group { animation: pulse 3s infinite; }
    </style>
  </defs>

  <g class="glow-group">
    <rect class="bg" width="136" height="36" x="2" y="2" rx="18" />
    <g transform="translate(15, 8)" stroke="#EA4335" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none">
      <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z" /><polyline points="22,6 12,13 2,6" />
