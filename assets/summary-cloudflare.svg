<svg xmlns="http://www.w3.org/2000/svg" width="800" height="56" viewBox="0 0 800 56" fill="none">
  <!-- Card Background with Gradient -->
  <defs>
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1f2335" />
      <stop offset="100%" stop-color="#16161e" />
    </linearGradient>
    <linearGradient id="cloudflare-accent" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ff9e64" />
      <stop offset="100%" stop-color="#ff79c6" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Outer Rounded Container -->
  <rect width="800" height="56" rx="8" fill="url(#bg-grad)" stroke="#30363d" stroke-width="1" />
  
  <!-- Left Side Accent Indicator Bar -->
  <rect width="4" height="56" rx="2" fill="url(#cloudflare-accent)" />

  <!-- Section Icon (Cloud/Lightning Icon) -->
  <g transform="translate(20, 16)" stroke="url(#cloudflare-accent)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <path d="M19 16.9A5 5 0 0 0 18 7h-1.26a8 8 0 1 0-11.62 8.58" />
    <polyline points="13 11 9 17 12 17 8 23" />
  </g>

  <!-- Section Title -->
  <text x="60" y="34" fill="#a9b1d6" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif" font-size="14" font-weight="700" letter-spacing="1">
    CLOUDFLARE &amp; EDGE ARCHITECTURE
  </text>

  <!-- Subtitle -->
  <text x="325" y="33" fill="#565f89" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif" font-size="11" font-weight="500" letter-spacing="0.5">
    •  99.9% Cache Hit Rate &amp; $0 Infrastructure
  </text>

  <!-- Interactive Call-To-Action (Right Side) -->
  <g transform="translate(660, 15)">
    <!-- Pill Badge -->
    <rect width="120" height="26" rx="13" fill="#1e2233" stroke="#ff9e64" stroke-width="1" stroke-opacity="0.6" filter="url(#glow)" />
    <!-- Expand Text -->
    <text x="18" y="17" fill="#ff9e64" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif" font-size="10" font-weight="700" letter-spacing="1">
      CLICK TO EXPAND
    </text>
    <!-- Chevron -->
    <path d="M102 11l4 4-4 4" stroke="#ff9e64" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
  </g>
</svg>
