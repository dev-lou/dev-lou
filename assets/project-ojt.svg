<svg xmlns="http://www.w3.org/2000/svg" width="400" height="180" viewBox="0 0 400 180" fill="none">
  <defs>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#9ece6a" stop-opacity="0.8" />
      <stop offset="100%" stop-color="#73daca" stop-opacity="0.2" />
    </linearGradient>
    <style>
      .bg { fill: #0d1117; stroke: url(#accent); stroke-width: 2; transition: all 0.3s ease; }
      .bg:hover { fill: #1a1b2e; cursor: pointer; }
      .title { fill: #a9b1d6; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; font-size: 18px; font-weight: 700; }
      .subtitle { fill: #9ece6a; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; font-size: 13px; font-weight: 600; font-style: italic; }
      .desc { fill: #7a88cf; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; font-size: 12px; font-weight: 400; line-height: 1.5; }
      .badge-bg { fill: #1a1b2e; stroke-width: 1; rx: 4; }
      .badge-text { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; font-size: 11px; font-weight: 600; fill: #a9b1d6; }
      @keyframes float { 0%,100% { transform:translateY(0) } 50% { transform:translateY(-2px) } }
      .ico { animation: float 3s ease-in-out infinite; }
    </style>
  </defs>

  <rect class="bg" width="396" height="176" x="2" y="2" rx="12" />

  <!-- Double Wrapper Fix for Float Animation -->
  <g transform="translate(20, 20)">
    <g class="ico" stroke="#9ece6a" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none">
      <rect x="3" y="3" width="18" height="18" rx="2" />
    <path d="M3 9h18 M9 21V9" />
    </g>
  </g>

  <!-- Text Content -->
  <text x="50" y="35" class="title">OJT-Qr-Pass <tspan fill="#565f89">· Live</tspan></text>
  <text x="20" y="60" class="subtitle">QR Attendance System</text>
  
  <text x="20" y="85" class="desc">Vercel-optimized student OJT tracking app with edge</text>
  <text x="20" y="105" class="desc">validation, client QR generators, and dashboards.</text>

  <!-- Badges -->
  <g transform="translate(20, 135)">
    <!-- JavaScript -->
    <rect class="badge-bg" width="70" height="22" stroke="#F7DF1E" />
    <text x="8" y="15" class="badge-text">JavaScript</text>
    <!-- Node.js -->
    <g transform="translate(78, 0)">
      <rect class="badge-bg" width="60" height="22" stroke="#339933" />
      <text x="8" y="15" class="badge-text">Node.js</text>
    </g>
    <!-- Vercel -->
    <g transform="translate(146, 0)">
      <rect class="badge-bg" width="55" height="22" stroke="#ffffff" />
      <text x="8" y="15" class="badge-text" fill="#ffffff">Vercel</text>
    </g>
    <!-- CSS -->
    <g transform="translate(209, 0)">
      <rect class="badge-bg" width="40" height="22" stroke="#1572B6" />
      <text x="8" y="15" class="badge-text">CSS</text>
    </g>
  </g>
</svg>