<svg xmlns="http://www.w3.org/2000/svg" width="800" height="56" viewBox="0 0 800 56" fill="none">
  <!-- Card Background with Gradient -->
  <defs>
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1f2335" />
      <stop offset="100%" stop-color="#16161e" />
    </linearGradient>
    <linearGradient id="devops-accent" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#73daca" />
      <stop offset="100%" stop-color="#9ece6a" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Outer Rounded Container -->
  <rect width="800" height="56" rx="8" fill="url(#bg-grad)" stroke="#30363d" stroke-width="1" />
  
  <!-- Left Side Accent Indicator Bar -->
  <rect width="4" height="56" rx="2" fill="url(#devops-accent)" />

  <!-- Section Icon (Terminal/Git branch Icon) -->
  <g transform="translate(20, 16)" stroke="url(#devops-accent)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <polyline points="4 17 10 11 4 5" />
    <line x1="12" y1="19" x2="20" y2="19" />
  </g>

  <!-- Section Title -->
  <text x="60" y="34" fill="#a9b1d6" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif" font-size="14" font-weight="700" letter-spacing="1">
    DEVOPS &amp; SUPPLY-CHAIN AUTOMATION
  </text>

  <!-- Subtitle -->
  <text x="325" y="33" fill="#565f89" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif" font-size="11" font-weight="500" letter-spacing="0.5">
    •  Pre-commit Quality Gates &amp; CI/CD Pipelines
  </text>

  <!-- Interactive Call-To-Action (Right Side) -->
  <g transform="translate(660, 15)">
    <!-- Pill Badge -->
    <rect width="120" height="26" rx="13" fill="#1e2233" stroke="#73daca" stroke-width="1" stroke-opacity="0.6" filter="url(#glow)" />
    <!-- Expand Text -->
    <text x="18" y="17" fill="#73daca" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif" font-size="10" font-weight="700" letter-spacing="1">
      CLICK TO EXPAND
    </text>
    <!-- Chevron -->
    <path d="M102 11l4 4-4 4" stroke="#73daca" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
  </g>
</svg>
