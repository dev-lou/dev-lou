<svg xmlns="http://www.w3.org/2000/svg" width="140" height="40" viewBox="0 0 140 40" fill="none">
  <defs>
    <style>
      .bg { fill: #ffffff; stroke: #70A5FD; stroke-width: 1.5; transition: all 0.3s ease; }
      .bg:hover { fill: #e8ecf0; stroke-width: 2.5; filter: drop-shadow(0 0 6px #70A5FD80); cursor: pointer; }
      .text { fill: #24292f; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; font-size: 11px; font-weight: 700; letter-spacing: 1px; }
      @keyframes pulse { 0% { filter: drop-shadow(0 0 2px #70A5FD40); } 50% { filter: drop-shadow(0 0 6px #70A5FD80); } 100% { filter: drop-shadow(0 0 2px #70A5FD40); } }
      .glow-group { animation: pulse 3s infinite; }
    </style>
  </defs>

  <g class="glow-group">
    <rect class="bg" width="136" height="36" x="2" y="2" rx="18" />
    <g transform="translate(15, 8)" stroke="#70A5FD" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none">
      <circle cx="12" cy="12" r="10" /><path d="M2 12h20M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/>
    </g>
    <text x="88" y="24" text-anchor="middle" class="text">PORTFOLIO</text>
  </g>
</svg>